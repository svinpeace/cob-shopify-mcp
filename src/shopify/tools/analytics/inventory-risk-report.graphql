query InventoryRiskReport($first: Int!, $after: String) {
  productVariants(first: $first, after: $after) {
    edges {
      node {
        id
        title
        sku
        inventoryQuantity
        product {
          id
          title
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
