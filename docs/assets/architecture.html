<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cob-shopify-mcp — Architecture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      width: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
    }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #8b5cf6, #6c63ff, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .header p {
      color: #888;
      font-size: 0.95rem;
    }
    .legend {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* ── Diagram Container ── */
    .diagram-container {
      width: 100%;
      max-width: 1400px;
      padding: 1rem;
      display: flex;
      justify-content: center;
    }

    /* ── Mermaid Overrides ── */
    .mermaid {
      width: 100%;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(108, 99, 255, 0.3)); }
      50%      { filter: drop-shadow(0 0 12px rgba(108, 99, 255, 0.6)); }
    }
    @keyframes flowLine {
      0%   { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50%      { stroke-opacity: 1; }
    }

    .mermaid svg {
      animation: fadeInUp 0.8s ease-out;
    }

    /* Animate edges with flowing dashes */
    .mermaid .flowchart-link {
      stroke-dasharray: 5, 3 !important;
      animation: flowLine 1.5s linear infinite !important;
    }

    /* Pulse effect on the API node */
    .mermaid .node:last-of-type rect,
    .mermaid .node:last-of-type polygon {
      animation: pulseGlow 3s ease-in-out infinite;
    }

    /* Subgraph border animation */
    .mermaid .cluster rect {
      animation: borderPulse 4s ease-in-out infinite;
      rx: 12;
      ry: 12;
    }

    /* Node hover effect */
    .mermaid .node:hover rect,
    .mermaid .node:hover polygon {
      filter: brightness(1.3) drop-shadow(0 0 8px rgba(108, 99, 255, 0.5));
      cursor: pointer;
      transition: filter 0.3s ease;
    }

    /* Tooltip styling */
    .tooltip-box {
      display: none;
      position: fixed;
      background: #1a1a2e;
      border: 1px solid #6c63ff;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #e0e0e0;
      max-width: 300px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
      pointer-events: none;
    }
    .tooltip-box.visible {
      display: block;
      animation: fadeInUp 0.2s ease-out;
    }
    .tooltip-box strong {
      color: #8b5cf6;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: #555;
      font-size: 0.8rem;
    }
    .footer a {
      color: #6c63ff;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      padding: 0.5rem;
      flex-wrap: wrap;
    }
    .controls button {
      background: #1a1a2e;
      border: 1px solid #6c63ff;
      color: #e0e0e0;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .controls button:hover {
      background: #6c63ff;
      color: #fff;
    }
    .controls button.active {
      background: #6c63ff;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛍️ cob-shopify-mcp</h1>
    <p>Architecture — Core + Shell with Config-Driven Tool Engine</p>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background: #8b5cf6;"></div>
        <span>Entry Points</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #3b82f6;"></div>
        <span>Core Engine</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #10b981;"></div>
        <span>Shopify Shell</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #ef4444;"></div>
        <span>Tier 2 (Disabled)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: #7c3aed;"></div>
        <span>Shopify API</span>
      </div>
    </div>
    <div class="controls">
      <button id="btn-full" class="active" onclick="showView('full')">Full Architecture</button>
      <button id="btn-core" onclick="showView('core')">Core Engine</button>
      <button id="btn-shopify" onclick="showView('shopify')">Shopify Shell</button>
      <button id="btn-data" onclick="showView('data')">Data Flow</button>
    </div>
  </div>

  <div class="diagram-container">
    <pre class="mermaid" id="diagram">
    </pre>
  </div>

  <div id="tooltip" class="tooltip-box"></div>

  <div class="footer">
    <p>cob-shopify-mcp — The definitive open-source MCP server for Shopify</p>
    <p><a href="https://github.com/callobuzz/cob-shopify-mcp">GitHub</a> · Open this file in any browser to view</p>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#1a1a2e',
        primaryTextColor: '#e0e0e0',
        primaryBorderColor: '#6c63ff',
        lineColor: '#6c63ff',
        secondaryColor: '#16213e',
        tertiaryColor: '#0f3460',
        mainBkg: '#1a1a2e',
        nodeBorder: '#6c63ff',
        clusterBkg: '#16213e',
        clusterBorder: '#6c63ff',
        edgeLabelBackground: '#1a1a2e',
        nodeTextColor: '#e0e0e0',
        fontSize: '14px',
      },
      flowchart: {
        curve: 'basis',
        padding: 20,
        htmlLabels: true,
        useMaxWidth: true,
      },
    });

    const diagrams = {
      full: `flowchart TB
    subgraph ENTRY["🚀 Entry Points"]
        direction LR
        CLI["🖥️ <b>CLI</b><br/><i>connect · serve · tools</i>"]
        STDIO["📡 <b>MCP Server</b><br/><i>stdio transport</i>"]
        HTTP["🌐 <b>HTTP Server</b><br/><i>Streamable HTTP</i>"]
    end

    subgraph CORE["⚙️ Core Engine — API-Agnostic"]
        direction TB
        subgraph REG["📋 Registry & Discovery"]
            direction LR
            AD["🔍 <b>Auto-Discover</b><br/><i>*.tool.ts · *.tool.yaml</i>"]
            REGISTRY["📦 <b>Tool Registry</b><br/><i>register · list · filter</i>"]
            CF["⚡ <b>Config Filter</b><br/><i>enable · disable · tiers</i>"]
        end
        subgraph ENG["🔧 MCP Engines"]
            direction LR
            TE["🛠️ <b>Tool Engine</b><br/><i>schema → execute → map</i>"]
            RE["📄 <b>Resource Engine</b><br/><i>read-only data</i>"]
            PE["💬 <b>Prompt Engine</b><br/><i>templates & workflows</i>"]
        end
        subgraph INF["🏗️ Infrastructure"]
            direction LR
            AUTH["🔐 <b>Auth Manager</b><br/><i>token · OAuth</i>"]
            OBS["📊 <b>Observability</b><br/><i>logs · metrics · audit</i>"]
            STR["💾 <b>Storage</b><br/><i>JSON · SQLite+enc</i>"]
        end
        DT["✨ <b>defineTool()</b> Helper"]
    end

    subgraph SHOP["🛍️ Shopify Shell"]
        direction TB
        subgraph GQL["🔗 Shopify GraphQL Client"]
            direction LR
            CL["<b>@shopify/<br/>admin-api-client</b>"]
            RL["⏱️ <b>Rate Limiter</b>"]
            CA["💨 <b>Cache Layer</b>"]
        end
        subgraph TOOLS["🧰 Tool Definitions — Co-located"]
            direction LR
            P["📦 <b>Products</b><br/>15 tools"]
            O["🧾 <b>Orders</b><br/>12 tools"]
            C["👥 <b>Customers</b><br/>9 tools"]
            I["📊 <b>Inventory</b><br/>7 tools"]
            A["📈 <b>Analytics</b><br/>6 tools"]
        end
        T2["🔒 <b>Tier 2 — Disabled by Default</b><br/><i>Billing · Payments · Themes · Store Config · more...</i>"]
        subgraph MCP["🎯 MCP Primitives"]
            direction LR
            RES["📑 <b>Resources</b><br/><i>shop info · locations</i>"]
            PRM["💡 <b>Prompts</b><br/><i>store health · reports</i>"]
        end
    end

    API["🏪 <b>Shopify Admin GraphQL API</b><br/><i>v2026-01</i>"]

    CLI --> CORE
    STDIO --> CORE
    HTTP --> CORE
    AD --> REGISTRY --> CF
    CF --> TE & RE & PE
    DT -.-> REGISTRY
    TE --> GQL
    RE --> GQL
    PE --> GQL
    AUTH --> GQL
    OBS -.-> TE
    STR -.-> AUTH
    CL --> RL --> CA
    TOOLS --> DT
    T2 -.-> DT
    RES --> RE
    PRM --> PE
    CA --> API

    style ENTRY fill:#2d1b69,stroke:#8b5cf6,stroke-width:2px,color:#e0e0e0
    style CORE fill:#0f2942,stroke:#3b82f6,stroke-width:2px,color:#e0e0e0
    style SHOP fill:#0f3425,stroke:#10b981,stroke-width:2px,color:#e0e0e0
    style REG fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style ENG fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style INF fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style GQL fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style TOOLS fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style MCP fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style T2 fill:#3a1515,stroke:#ef4444,stroke-width:2px,color:#e0e0e0
    style API fill:#5b21b6,stroke:#a78bfa,stroke-width:3px,color:#ffffff
    style DT fill:#7c2d12,stroke:#f97316,stroke-width:2px,color:#e0e0e0`,

      core: `flowchart TB
    subgraph CORE["⚙️ Core Engine — API-Agnostic"]
        direction TB
        subgraph DISC["📋 Discovery Pipeline"]
            direction LR
            SCAN["🔍 <b>File Scanner</b><br/><i>Glob *.tool.ts *.tool.yaml</i>"]
            PARSE["📝 <b>Definition Parser</b><br/><i>YAML / TypeScript</i>"]
            VALID["✅ <b>Schema Validator</b><br/><i>Zod v4</i>"]
        end
        subgraph REG["📦 Registry"]
            direction LR
            STORE_REG["<b>Tool Store</b><br/><i>Map&lt;name, definition&gt;</i>"]
            CFG["⚡ <b>Config Filter</b><br/><i>tiers · enable · disable</i>"]
            PLUG["🔌 <b>Plugin Loader</b><br/><i>custom tool paths</i>"]
        end
        subgraph ENG["🔧 Execution"]
            direction LR
            TE["🛠️ <b>Tool Engine</b><br/><i>validate → execute → map</i>"]
            RE["📄 <b>Resource Engine</b>"]
            PE["💬 <b>Prompt Engine</b>"]
        end
        subgraph TRANS["📡 Transport"]
            direction LR
            STD["<b>stdio</b><br/><i>StdioServerTransport</i>"]
            HTT["<b>Streamable HTTP</b><br/><i>port configurable</i>"]
        end
        subgraph INFRA["🏗️ Infrastructure"]
            direction LR
            AUTH["🔐 <b>Auth Interface</b><br/><i>getToken() · refresh()</i>"]
            LOG["📊 <b>Logger</b><br/><i>structured JSON</i>"]
            AUDIT["📋 <b>Audit Trail</b><br/><i>tool · timestamp · params</i>"]
            METRICS["📈 <b>Metrics</b><br/><i>latency · errors · usage</i>"]
        end
        DT["✨ <b>defineTool() · defineResource() · definePrompt()</b>"]
    end

    SCAN --> PARSE --> VALID --> STORE_REG
    PLUG --> STORE_REG
    STORE_REG --> CFG --> TE & RE & PE
    TE --> STD & HTT
    RE --> STD & HTT
    PE --> STD & HTT
    TE -.-> LOG & AUDIT & METRICS
    DT -.-> VALID

    style CORE fill:#0f2942,stroke:#3b82f6,stroke-width:2px,color:#e0e0e0
    style DISC fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style REG fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style ENG fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style TRANS fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style INFRA fill:#162d50,stroke:#3b82f6,stroke-width:1px,color:#e0e0e0
    style DT fill:#7c2d12,stroke:#f97316,stroke-width:2px,color:#e0e0e0`,

      shopify: `flowchart TB
    subgraph SHOP["🛍️ Shopify Shell"]
        direction TB
        subgraph CLIENT["🔗 GraphQL Client"]
            direction LR
            API_CL["<b>@shopify/admin-api-client</b><br/><i>createAdminApiClient()</i>"]
            OAUTH["<b>@shopify/shopify-api</b><br/><i>OAuth flow</i>"]
        end
        subgraph MIDDLEWARE["⚡ Middleware"]
            direction LR
            RL["⏱️ <b>Rate Limiter</b><br/><i>token bucket · 4 req/s</i>"]
            CACHE["💨 <b>Cache</b><br/><i>TTL-based · per-query</i>"]
            RETRY["🔄 <b>Retry</b><br/><i>exponential backoff</i>"]
        end
        subgraph T1["🧰 Tier 1 — Enabled by Default"]
            direction LR
            P["📦 <b>Products</b><br/>list · get · search · create<br/>update · variants · collections<br/>tags · status<br/><i>15 tools</i>"]
            O["🧾 <b>Orders</b><br/>list · search · get · timeline<br/>fulfillment · draft · notes<br/>tags · mark paid<br/><i>12 tools</i>"]
            C["👥 <b>Customers</b><br/>list · search · get · orders<br/>LTV · create · update · tags<br/><i>9 tools</i>"]
            I["📊 <b>Inventory</b><br/>item · SKU · levels · location<br/>low stock · adjust · set<br/><i>7 tools</i>"]
            A["📈 <b>Analytics</b><br/>sales · top products · orders<br/>refunds · repeat rate · risk<br/><i>6 tools</i>"]
        end
        subgraph T2["🔒 Tier 2 — Disabled by Default"]
            direction LR
            BILL["💳 Billing"]
            PAY["💰 Payments"]
            THEME["🎨 Themes"]
            DISC["🏷️ Discounts"]
            MKT["📣 Marketing"]
            META["📋 Metafields"]
            CONF["⚙️ Store Config"]
            MORE["... extensible"]
        end
        subgraph PRIM["🎯 MCP Primitives"]
            direction LR
            RES["📑 <b>Resources</b><br/>shop://info · locations<br/>policies · currencies"]
            PRM["💡 <b>Prompts</b><br/>store health · sales report<br/>inventory risk · support"]
        end
    end

    SHOPIFY_API["🏪 <b>Shopify Admin GraphQL API</b> · v2026-01"]

    API_CL --> RL --> CACHE --> RETRY
    OAUTH -.-> API_CL
    T1 --> CLIENT
    T2 -.-> CLIENT
    RETRY --> SHOPIFY_API

    style SHOP fill:#0f3425,stroke:#10b981,stroke-width:2px,color:#e0e0e0
    style CLIENT fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style MIDDLEWARE fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style T1 fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style T2 fill:#3a1515,stroke:#ef4444,stroke-width:2px,color:#e0e0e0
    style PRIM fill:#1a4731,stroke:#10b981,stroke-width:1px,color:#e0e0e0
    style SHOPIFY_API fill:#5b21b6,stroke:#a78bfa,stroke-width:3px,color:#ffffff`,

      data: `flowchart LR
    USER["👤 <b>User / AI Agent</b>"]

    subgraph REQUEST["→ Request Flow"]
        direction TB
        R1["1️⃣ MCP Tool Call<br/><i>e.g. list_products(limit: 5)</i>"]
        R2["2️⃣ Zod Validation<br/><i>validate input schema</i>"]
        R3["3️⃣ Config Check<br/><i>tool enabled? tier allowed?</i>"]
        R4["4️⃣ Auth Injection<br/><i>add X-Shopify-Access-Token</i>"]
        R5["5️⃣ Rate Limit Gate<br/><i>token bucket check</i>"]
        R6["6️⃣ Cache Lookup<br/><i>hit? return cached</i>"]
        R7["7️⃣ GraphQL Execute<br/><i>POST to Shopify API</i>"]
    end

    API["🏪 Shopify API"]

    subgraph RESPONSE["← Response Flow"]
        direction TB
        S1["8️⃣ Response Received<br/><i>raw GraphQL response</i>"]
        S2["9️⃣ Response Mapping<br/><i>extract & normalize</i>"]
        S3["🔟 Audit Log<br/><i>tool · duration · status</i>"]
        S4["1️⃣1️⃣ Cache Store<br/><i>TTL-based caching</i>"]
        S5["1️⃣2️⃣ MCP Response<br/><i>{ content: [{ type: text }] }</i>"]
    end

    USER --> R1 --> R2 --> R3 --> R4 --> R5 --> R6 --> R7 --> API
    API --> S1 --> S2 --> S3 --> S4 --> S5 --> USER

    style REQUEST fill:#162d50,stroke:#3b82f6,stroke-width:2px,color:#e0e0e0
    style RESPONSE fill:#0f3425,stroke:#10b981,stroke-width:2px,color:#e0e0e0
    style API fill:#5b21b6,stroke:#a78bfa,stroke-width:3px,color:#ffffff
    style USER fill:#2d1b69,stroke:#8b5cf6,stroke-width:2px,color:#e0e0e0`,
    };

    async function renderDiagram(code) {
      const el = document.getElementById('diagram');
      el.removeAttribute('data-processed');
      el.textContent = code;
      await mermaid.run({ nodes: [el] });
    }

    // Initial render
    await renderDiagram(diagrams.full);

    // View switching
    window.showView = async (view) => {
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + view).classList.add('active');
      await renderDiagram(diagrams[view]);
    };

    // Tooltip handling
    const tooltip = document.getElementById('tooltip');
    const tooltipData = {
      'Auto-Discover': 'Scans tool directories for *.tool.ts and *.tool.yaml files. Supports both TypeScript and YAML definitions.',
      'Tool Registry': 'Central store of all tool definitions. Supports register, list, filter, and plugin loading.',
      'Config Filter': 'Applies tier-based defaults, user enable/disable rules, and read-only mode filtering.',
      'Tool Engine': 'Generates Zod schemas from definitions, executes GraphQL via Shopify client, maps responses.',
      'Resource Engine': 'Serves read-only MCP resources like shop info, locations, policies.',
      'Prompt Engine': 'Manages prompt templates for guided AI workflows.',
      'defineTool()': 'Helper function for declaring tools with type safety. Auto-registers with the registry.',
      'Rate Limiter': 'Token bucket algorithm respecting Shopify API limits (default 4 req/s with burst of 10).',
      'Cache Layer': 'TTL-based query cache. Reduces API calls for repeated queries.',
      'Auth Manager': 'Supports static access tokens and OAuth client credentials with automatic refresh.',
      'Storage': 'Pluggable backends: JSON files (default, zero deps) or SQLite with token encryption.',
      'Observability': 'Structured JSON logging, metrics collection, and audit trail for every tool invocation.',
    };

    document.addEventListener('mousemove', (e) => {
      const node = e.target.closest('.node');
      if (node) {
        const text = node.textContent || '';
        const match = Object.keys(tooltipData).find(key => text.includes(key));
        if (match) {
          tooltip.innerHTML = `<strong>${match}</strong><br/>${tooltipData[match]}`;
          tooltip.classList.add('visible');
          tooltip.style.left = (e.clientX + 15) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
          return;
        }
      }
      tooltip.classList.remove('visible');
    });
  </script>
</body>
</html>
